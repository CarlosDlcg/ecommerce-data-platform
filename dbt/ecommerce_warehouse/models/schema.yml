version: 2

models:

  - name: dim_customers

    columns:

      - name: customer_id
        tests:
          - not_null

      - name: email
        tests:
          - not_null

  - name: fact_orders

    columns:

      - name: order_id
        tests:
          - not_null
          - unique

      - name: customer_id
        tests:
          - not_null

          - relationships:
              to: ref('dim_customers')
              field: customer_id